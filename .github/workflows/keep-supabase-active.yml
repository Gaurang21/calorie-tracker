name: Keep Supabase active

on:
  schedule:
    # Runs every 5 days at 08:00 UTC (well within the 7-day pause window)
    - cron: '0 8 */5 * *'
  workflow_dispatch: # allow manual trigger from GitHub Actions UI

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.VITE_SUPABASE_URL }}/rest/v1/" \
            -H "apikey: ${{ secrets.VITE_SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.VITE_SUPABASE_ANON_KEY }}")
          echo "Supabase responded with HTTP $STATUS"
          if [ "$STATUS" -eq 401 ]; then
            echo "401 Unauthorized — the anon key secret is invalid or has extra whitespace."
            exit 1
          fi
          if [ "$STATUS" -lt 200 ] || [ "$STATUS" -ge 300 ]; then
            echo "Unexpected status code: $STATUS"
            exit 1
          fi
          echo "Supabase is awake."
